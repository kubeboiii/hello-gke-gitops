apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend-dev
  namespace: argocd
spec:
  project: hello-gke
  source:
    repoURL: https://github.com/YOUR_ORG/hello-gke-gitops.git
    targetRevision: main
    path: apps/frontend/helm
    helm:
      valueFiles:
        - ../../environments/dev/frontend-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: hello-gke
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
